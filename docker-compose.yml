version: "3.8"

networks:
  biblioteca-net:
    driver: bridge

volumes:
  mysql-data:

services:

  mysql:
    image: mysql:8.0
    container_name: biblioteca-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_USER: biblioteca
      MYSQL_PASSWORD: biblioteca1234
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - biblioteca-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  ms-usuarios:
    build: ./ms-usuarios
    container_name: ms-usuarios
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_usuarios?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: biblioteca
      SPRING_DATASOURCE_PASSWORD: biblioteca1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - biblioteca-net

  ms-libros:
    build: ./ms-libros
    container_name: ms-libros
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_libros?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
